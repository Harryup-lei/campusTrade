server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: campus-second-hand-trade

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_trade?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.trade.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: campusSecondHandTradeSecretKey123456789
  expiration: 86400000

# 文件上传配置
file:
  # 上传存储路径 (开发环境直接写入源码目录)
#  upload-path: g:/26年春季课程/开源与群智/91026校园二手交易平台/backend/src/main/resources/image/
  upload-path: D:/code/ClaudeCode/校园二手交易文件存储
  # 访问路径前缀
  access-path: /image/**
